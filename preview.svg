<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" width="860" height="520" role="img" aria-label="Custom Flow Card preview">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#14213d" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="820" height="480" rx="18" fill="#f8fafc" stroke="#c7d3e5" filter="url(#shadow)"/>
  <text x="52" y="66" fill="#25324d" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">V-Guard Inverter Flow</text>
  <rect x="620" y="38" width="170" height="34" rx="17" fill="#ffffff" stroke="#c7d3e5"/>
  <text x="705" y="60" text-anchor="middle" fill="#25324d" font-size="14" font-family="Segoe UI, Arial, sans-serif">Backup: solar + battery</text>

  <rect x="52" y="92" width="756" height="282" rx="14" fill="#eef4fb" stroke="#c7d3e5"/>

  <g font-family="Segoe UI, Arial, sans-serif">
    <g transform="translate(72,112)">
      <rect width="190" height="72" rx="8" fill="#ffffff" stroke="#c7d3e5"/>
      <text x="16" y="24" fill="#5f6f89" font-size="14">Grid / Mains</text>
      <text x="16" y="50" fill="#25324d" font-size="24" font-weight="700">0 W</text>
      <text x="104" y="50" fill="#5f6f89" font-size="13">Mains cutoff</text>
      <rect x="16" y="58" width="158" height="6" rx="3" fill="#dbe4f0"/>
    </g>

    <g transform="translate(72,198)">
      <rect width="190" height="72" rx="8" fill="#ffffff" stroke="#d97706"/>
      <text x="16" y="24" fill="#5f6f89" font-size="14">Solar</text>
      <text x="16" y="50" fill="#25324d" font-size="24" font-weight="700">420 W</text>
      <text x="104" y="50" fill="#5f6f89" font-size="13">feeding load</text>
      <rect x="16" y="58" width="158" height="6" rx="3" fill="#eadcc7"/>
      <rect x="16" y="58" width="92" height="6" rx="3" fill="#d97706"/>
    </g>

    <g transform="translate(72,284)">
      <rect width="190" height="72" rx="8" fill="#ffffff" stroke="#8b5cf6"/>
      <text x="16" y="24" fill="#5f6f89" font-size="14">Battery</text>
      <text x="16" y="50" fill="#25324d" font-size="24" font-weight="700">280 W</text>
      <text x="104" y="50" fill="#5f6f89" font-size="13">82% | 26.4V</text>
      <rect x="16" y="58" width="158" height="6" rx="3" fill="#e5dcff"/>
      <rect x="16" y="58" width="62" height="6" rx="3" fill="#8b5cf6"/>
    </g>

    <g transform="translate(286,112)">
      <rect width="302" height="244" rx="8" fill="#ffffff" stroke="#c7d3e5"/>
      <text x="20" y="28" fill="#5f6f89" font-size="13">Inverter output</text>
      <text x="20" y="58" fill="#25324d" font-size="24" font-weight="700">700 W</text>
      <line x1="20" y1="76" x2="282" y2="76" stroke="#d8e0ed"/>
      <text x="20" y="112" fill="#25324d" font-size="18" font-weight="700">Mains is cut off.</text>
      <text x="20" y="138" fill="#25324d" font-size="18" font-weight="700">Load needs 700 W.</text>
      <text x="20" y="164" fill="#25324d" font-size="18" font-weight="700">Solar and battery are sharing it.</text>
      <g transform="translate(20,184)" font-size="13">
        <rect width="262" height="30" rx="8" fill="#eef4fb"/>
        <text x="12" y="20" fill="#25324d">Solar -> Load</text>
        <text x="250" y="20" text-anchor="end" fill="#25324d" font-weight="700">420 W</text>
      </g>
      <g transform="translate(20,220)" font-size="13">
        <rect width="262" height="30" rx="8" fill="#eef4fb"/>
        <text x="12" y="20" fill="#25324d">Battery -> Load</text>
        <text x="250" y="20" text-anchor="end" fill="#25324d" font-weight="700">280 W</text>
      </g>
    </g>

    <g transform="translate(612,112)">
      <rect width="176" height="244" rx="8" fill="#ffffff" stroke="#c7d3e5"/>
      <circle cx="88" cy="54" r="28" fill="#ffedd5"/>
      <text x="88" y="116" text-anchor="middle" fill="#5f6f89" font-size="13">Current load</text>
      <text x="88" y="150" text-anchor="middle" fill="#25324d" font-size="28" font-weight="700">700 W</text>
      <text x="88" y="178" text-anchor="middle" fill="#5f6f89" font-size="13">solar 420 W + battery 280 W</text>
      <rect x="36" y="204" width="104" height="7" rx="4" fill="#f3d5bf"/>
      <rect x="36" y="204" width="104" height="7" rx="4" fill="#ea580c"/>
    </g>
  </g>

  <rect x="52" y="394" width="756" height="78" rx="10" fill="#ffffff" stroke="#c7d3e5"/>
  <g fill="#41526f" font-size="13" font-family="Segoe UI, Arial, sans-serif">
    <text x="76" y="424">Out Today: 5.4 kWh</text>
    <text x="236" y="424">Grid Today: 2.1 kWh</text>
    <text x="408" y="424">Temp: 36 C</text>
    <text x="528" y="424">Cuts: 1</text>
    <text x="632" y="424">BLE: connected</text>
    <text x="76" y="452">Battery Calc: discharging 280 W</text>
    <text x="314" y="452">Solar Calc: 1.82A x 230V</text>
    <text x="552" y="452">Mains V: 0 V</text>
  </g>
</svg>
