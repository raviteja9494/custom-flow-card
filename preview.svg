<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" width="860" height="520" role="img" aria-label="Custom Flow Card preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2430"/>
      <stop offset="100%" stop-color="#151923"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7af2a0"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="820" height="480" rx="18" fill="url(#bg)" stroke="#2d3444" stroke-width="2" filter="url(#softShadow)"/>
  <text x="56" y="70" fill="#dfe6f2" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="600">V-Guard Inverter Flow</text>

  <line x1="180" y1="235" x2="390" y2="235" stroke="#7af2a0" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="390" y1="100" x2="390" y2="190" stroke="#7af2a0" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="390" y1="280" x2="390" y2="375" stroke="#7af2a0" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="430" y1="235" x2="640" y2="235" stroke="#7af2a0" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(110,170)">
    <circle cx="0" cy="0" r="64" fill="#20293a" stroke="#3c4f6d" stroke-width="3"/>
    <text x="0" y="-6" text-anchor="middle" fill="#8bc7ff" font-size="15" font-family="Segoe UI, Arial">Grid</text>
    <text x="0" y="18" text-anchor="middle" fill="#eef4ff" font-size="16" font-family="Segoe UI, Arial" font-weight="700">620 W</text>
  </g>

  <g transform="translate(390,88)">
    <circle cx="0" cy="0" r="64" fill="#20293a" stroke="#bca84a" stroke-width="3"/>
    <text x="0" y="-6" text-anchor="middle" fill="#ffe281" font-size="15" font-family="Segoe UI, Arial">Solar</text>
    <text x="0" y="18" text-anchor="middle" fill="#eef4ff" font-size="16" font-family="Segoe UI, Arial" font-weight="700">410 W</text>
  </g>

  <g transform="translate(390,235)">
    <circle cx="0" cy="0" r="64" fill="#20293a" stroke="#6b7dff" stroke-width="3"/>
    <text x="0" y="-6" text-anchor="middle" fill="#9cadff" font-size="15" font-family="Segoe UI, Arial">Inverter</text>
    <text x="0" y="18" text-anchor="middle" fill="#eef4ff" font-size="16" font-family="Segoe UI, Arial" font-weight="700">1.03 kW</text>
  </g>

  <g transform="translate(390,383)">
    <circle cx="0" cy="0" r="64" fill="#20293a" stroke="#b36bff" stroke-width="3"/>
    <text x="0" y="-6" text-anchor="middle" fill="#d5a3ff" font-size="15" font-family="Segoe UI, Arial">Battery</text>
    <text x="0" y="18" text-anchor="middle" fill="#eef4ff" font-size="16" font-family="Segoe UI, Arial" font-weight="700">82% | 26.4V</text>
  </g>

  <g transform="translate(710,235)">
    <circle cx="0" cy="0" r="64" fill="#20293a" stroke="#ffaf63" stroke-width="3"/>
    <text x="0" y="-6" text-anchor="middle" fill="#ffc48d" font-size="15" font-family="Segoe UI, Arial">Load</text>
    <text x="0" y="18" text-anchor="middle" fill="#eef4ff" font-size="16" font-family="Segoe UI, Arial" font-weight="700">1.03 kW</text>
  </g>

  <rect x="56" y="430" width="748" height="52" rx="10" fill="#20293a" stroke="#303c54"/>
  <text x="90" y="461" fill="#c9d1e1" font-size="13" font-family="Segoe UI, Arial">Out Today: 5.4 kWh</text>
  <text x="250" y="461" fill="#c9d1e1" font-size="13" font-family="Segoe UI, Arial">Grid Today: 2.1 kWh</text>
  <text x="430" y="461" fill="#c9d1e1" font-size="13" font-family="Segoe UI, Arial">Temp: 36 °C</text>
  <text x="550" y="461" fill="#c9d1e1" font-size="13" font-family="Segoe UI, Arial">Cuts: 1</text>
  <text x="640" y="461" fill="#c9d1e1" font-size="13" font-family="Segoe UI, Arial">BLE: connected</text>
</svg>
